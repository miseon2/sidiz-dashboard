<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIDIZ 네이버 실적 대시보드 (최종)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- 스타일 정의 --- */
*{box-sizing:border-box;margin:0;padding:0}
body,*{font-family:'Inter','Apple SD Gothic Neo',sans-serif}
:root{--bg:#F8F8F8;--y:#FFD66B;--yd:#B8860B;--dark:#111;--g2:#999;--g4:#F5F5F5;--rd:#D93030;--gn:#1A8A5A;--go:#A07000;--sh:0 2px 12px rgba(0,0,0,0.06);--r:16px}
body{background:var(--bg);min-height:100vh}.wrap{display:flex;min-height:100vh}
.sb{width:54px;background:#fff;border-right:1px solid #EBEBEB;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:4px;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sb-logo{width:30px;height:30px;background:var(--y);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-bottom:12px;box-shadow:0 2px 8px rgba(255,214,107,0.4)}
.nb{padding:10px 0;width:100%;background:none;border:none;cursor:pointer;color:#CCC;font-size:18px}.nb.on{color:var(--dark)}
.main{flex:1;margin-left:54px;overflow-y:auto}.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#fff;border-bottom:1px solid #F0F0F0;position:sticky;top:0;z-index:50}
.page-title{font-size:14px;font-weight:700}.page-sub{font-size:10px;color:var(--g2)}.content{padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.fblock{background:#fff;border-radius:var(--r);padding:10px 14px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:5px}.frow{display:flex;align-items:center;gap:4px}.flbl{font-size:10px;color:var(--g2);width:28px}
.fp{padding:4px 13px;border-radius:99px;font-size:11px;border:none;background:var(--g4);color:var(--g2);cursor:pointer}.fp.on{background:var(--dark);color:#fff}.fp.yon{background:var(--y);color:var(--dark);font-weight:700}
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.kc{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid #F5F5F5}
.k-lbl{font-size:10px;color:var(--g2);margin-bottom:7px}.k-val{font-size:24px;font-weight:300;color:var(--dark);letter-spacing:-1px;line-height:1;margin-bottom:6px}.k-sub{font-size:10px;font-weight:500}
.cgridd{display:grid;grid-template-columns:175px 1fr;gap:11px}.cc{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);border:1px solid #F5F5F5}
.ctit{font-size:12px;font-weight:700;margin-bottom:2px}.csub{font-size:10px;color:var(--g2);margin-bottom:8px}
.donut-mid{display:flex;align-items:center;justify-content:center;padding:8px 0}
.pg{display:none}.pg.on{display:flex;flex-direction:column;gap:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="sb">
    <div class="sb-logo">S</div>
    <button class="nb on" onclick="sw(1)" id="n1">📊</button>
    <button class="nb" onclick="sw(2)" id="n2">💬</button>
  </div>
  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="ptit">SIDIZ 네이버 실적 대시보드</div>
        <div class="page-sub" id="last-updated">연결 확인 중...</div>
      </div>
      <button class="fp" onclick="fetchAll()">↺ 새로고침</button>
    </div>
    <div class="pg on" id="p1">
      <div class="content">
        <div class="fblock">
          <div class="frow"><span class="flbl">연도</span><div id="yr1" style="display:flex;gap:4px"></div></div>
          <div class="frow"><span class="flbl">월</span><div id="mo1" style="display:flex;gap:4px;flex-wrap:wrap"></div></div>
        </div>
        <div id="k1top" class="kgrid"></div>
        <div class="cgridd">
          <div class="cc">
            <div class="ctit">연 목표 달성율</div>
            <div class="donut-mid">
              <svg width="120" height="120" viewBox="0 0 150 150">
                <circle cx="75" cy="75" r="55" fill="none" stroke="#EEE" stroke-width="12"/>
                <circle id="darc" cx="75" cy="75" r="55" fill="none" stroke="#FFD66B" stroke-width="12" stroke-dasharray="345.4" stroke-dashoffset="345.4" stroke-linecap="round" transform="rotate(-90 75 75)"/>
                <text id="dpct" x="75" y="80" text-anchor="middle" font-size="20" font-weight="700" fill="#111">-</text>
              </svg>
            </div>
          </div>
          <div class="cc">
            <div class="ctit">월별 ERP 실적</div>
            <div style="height:150px"><canvas id="c1"></canvas></div>
          </div>
        </div>
      </div>
    </div>
    <div class="pg" id="p2"><div class="content"><h3>💬 부정후기 관리 화면 준비 중</h3></div></div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbznkgGbPy4HRNXpx73yMzmZlbQScriTcHjWKo5j9pxdCkMCu6X1F8ABIz0tuKT-N_4OUA/exec';
const GID1='543240057', GID2='1006983265';
let raw1=[], raw2=[], selYear=2026, charts={};

const toN=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[,\s]/g,''));return isNaN(n)?0:n;};
const f억=v=>(toN(v)/1e8).toFixed(1)+'억';

async function fetchAll(){
  console.log("1. 데이터 요청 시작...");
  document.getElementById('last-updated').textContent='데이터 로드 중...';
  try {
    const [j1, j2] = await Promise.all([
      fetch(`${API}?gid=${GID1}`).then(r => r.json()),
      fetch(`${API}?gid=${GID2}`).then(r => r.json())
    ]);
    console.log("2. 데이터 응답 성공!", {j1, j2});
    raw1 = j1.data || []; raw2 = j2.data || [];
    document.getElementById('last-updated').textContent = 'Last update: ' + new Date().toLocaleTimeString();
    render();
    console.log("3. 렌더링 완료");
  } catch (e) {
    console.error("❌ 에러 발생:", e);
    document.getElementById('last-updated').textContent = '연결 오류 (F12 확인)';
  }
}

function parseTab1(){
  return raw1.map(r => {
    const d = String(r['날짜'] || '');
    const p = d.split('/');
    const achRaw = r['매출 달성율 (ERP 기준)'];
    const achieve = toN(achRaw) > 10 ? toN(achRaw) : toN(achRaw) * 100;
    return { 
      year: parseInt(p[0]), month: parseInt(p[1]),
      ERP: toN(r['ERP 매출']), target: toN(r['매출 목표']), achieve
    };
  }).filter(r => !isNaN(r.year));
}

function render(){
  const p1 = parseTab1();
  const yrs = [...new Set(p1.map(r => r.year))].sort();
  const yrEl = document.getElementById('yr1');
  yrEl.innerHTML = '';
  yrs.forEach(y => {
    const b = document.createElement('button');
    b.className = 'fp' + (selYear === y ? ' on' : '');
    b.textContent = y + '년';
    b.onclick = () => { selYear = y; render(); };
    yrEl.appendChild(b);
  });

  const cur = p1.filter(r => r.year === selYear);
  const ytdERP = cur.reduce((s, r) => s + r.ERP, 0);
  const ytdTgt = cur.reduce((s, r) => s + r.target, 0);
  const ach = ytdTgt > 0 ? (ytdERP / ytdTgt * 100) : 0;

  document.getElementById('k1top').innerHTML = `
    <div class="kc"><div class="k-lbl">누적 ERP 매출</div><div class="k-val">${f억(ytdERP)}</div></div>
    <div class="kc"><div class="k-lbl">누적 목표</div><div class="k-val">${f억(ytdTgt)}</div></div>
    <div class="kc"><div class="k-lbl">평균 달성율</div><div class="k-val">${ach.toFixed(1)}%</div></div>
    <div class="kc"><div class="k-lbl">데이터 건수</div><div class="k-val">${cur.length}건</div></div>
  `;
  document.getElementById('dpct').textContent = ach.toFixed(1) + '%';
  document.getElementById('darc').style.strokeDashoffset = 345.4 * (1 - Math.min(ach, 100) / 100);

  const labels = Array.from({length:12}, (_,i)=> (i+1)+'월');
  const erpData = labels.map((_,i)=> cur.find(r=>r.month===i+1)?.ERP || 0);

  if(charts.c1) charts.c1.destroy();
  charts.c1 = new Chart(document.getElementById('c1'), {
    type: 'bar',
    data: { labels, datasets: [{ label: '실적', data: erpData, backgroundColor: '#111', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function sw(t){
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById('p' + t).classList.add('on');
}

window.onload = fetchAll;
</script>
</body>
</html>
