<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SIDIZ 최종 연결 확인</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        #status { font-weight: bold; color: blue; }
        pre { background: #eee; padding: 10px; overflow: auto; max-height: 200px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📊 SIDIZ 데이터 연결 상태</h2>
        <p>상태: <span id="status">연결 시도 중...</span></p>
        <hr>
        <h4>1번 시트 (실적) 데이터 샘플:</h4>
        <pre id="debug1">기다리는 중...</pre>
        <h4>2번 시트 (후기) 데이터 샘플:</h4>
        <pre id="debug2">기다리는 중...</pre>
    </div>

    <script>
        // 유저님의 실제 API 주소
        const API = 'https://script.google.com/macros/s/AKfycbznkgGbPy4HRNXpx73yMzmZlbQScriTcHjWKo5j9pxdCkMCu6X1F8ABIz0tuKT-N_4OUA/exec';
        const GID1 = '543240057';
        const GID2 = '1006983265';

        async function testConnection() {
            const statusEl = document.getElementById('status');
            try {
                console.log("데이터 요청 시작...");
                
                // 두 데이터를 동시에 가져옴
                const [r1, r2] = await Promise.all([
                    fetch(`${API}?gid=${GID1}`).then(res => res.json()),
                    fetch(`${API}?gid=${GID2}`).then(res => res.json())
                ]);

                console.log("데이터 수신 성공!");
                statusEl.textContent = "✅ 연결 성공! 데이터 수신 완료";
                statusEl.style.color = "green";

                // 화면에 데이터 일부 출력
                document.getElementById('debug1').textContent = JSON.stringify(r1.data.slice(0, 2), null, 2);
                document.getElementById('debug2').textContent = JSON.stringify(r2.data.slice(0, 2), null, 2);

            } catch (err) {
                console.error("에러 발생:", err);
                statusEl.textContent = "❌ 연결 실패: " + err.message;
                statusEl.style.color = "red";
            }
        }

        // 페이지 로드 시 바로 실행
        window.onload = testConnection;
    </script>
</body>
</html>
