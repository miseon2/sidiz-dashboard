<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIDIZ 네이버 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#FAF8F3;display:flex;min-height:100vh}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#D0CCC4;border-radius:2px}

/* 사이드바 */
#sidebar{width:58px;background:#fff;border-right:0.5px solid #EEEBE4;display:flex;flex-direction:column;align-items:center;padding-top:16px;gap:2px;position:fixed;top:0;left:0;height:100vh;z-index:100}
#sidebar .logo{font-size:13px;font-weight:900;color:#1A1A1A;margin-bottom:20px}
#sidebar .nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;width:100%;border:none;background:none;color:#AAA;border-left:3px solid transparent;transition:all .15s}
#sidebar .nav-btn.active{color:#1A1A1A;border-left:3px solid #1A1A1A}
#sidebar .nav-btn span.icon{font-size:18px}
#sidebar .nav-btn span.lbl{font-size:9px;font-weight:400}
#sidebar .nav-btn.active span.lbl{font-weight:700}

/* 메인 */
#main{margin-left:58px;flex:1;padding:20px 24px;min-width:0}

/* 헤더 */
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.header-title{font-size:17px;font-weight:800;color:#1A1A1A;letter-spacing:-.5px}
.header-sub{font-size:11px;color:#888;margin-top:2px}
.header-btns{display:flex;gap:8px}
.hbtn{padding:6px 12px;border-radius:8px;border:0.5px solid #EEEBE4;background:#fff;font-size:11px;color:#1A1A1A;display:flex;align-items:center;gap:4px}

/* 필터바 */
.filter-bar{display:flex;align-items:center;gap:6px;padding:10px 0;flex-wrap:wrap}
.filter-bar .divider{width:1px;height:18px;background:#E8E4DC;margin:0 4px}
.fbtn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:400;border:1px solid #E8E4DC;background:transparent;color:#888;transition:all .15s}
.fbtn.active{background:#1A1A1A;border-color:#1A1A1A;color:#fff;font-weight:600}
.fbtn:disabled{color:#CCC;cursor:default}

/* KPI 그리드 */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.kpi-card{background:#fff;border-radius:14px;padding:18px 20px;border:0.5px solid #EEEBE4}
.kpi-card .kpi-header{display:flex;justify-content:space-between;margin-bottom:8px}
.kpi-card .kpi-label{font-size:11px;color:#888;font-weight:500}
.kpi-card .kpi-icon{font-size:15px;opacity:.35}
.kpi-card .kpi-value{font-size:24px;font-weight:800;color:#1A1A1A;letter-spacing:-.5px;line-height:1}
.kpi-card .kpi-sub{font-size:11px;color:#888;margin-top:6px;font-weight:500}

/* 차트 카드 */
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.chart-grid-donut{display:grid;grid-template-columns:220px 1fr;gap:14px;margin-bottom:14px}
.chart-card{background:#fff;border-radius:14px;padding:18px 20px;border:0.5px solid #EEEBE4}
.chart-card.full{margin-bottom:14px}
.chart-title{font-size:14px;font-weight:700;color:#1A1A1A;margin-bottom:2px}
.chart-sub{font-size:11px;color:#888;margin-bottom:14px}
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#888}
.legend-dot{width:8px;height:8px;border-radius:50%}
.legend-rect{width:10px;height:10px;border-radius:2px}
.legend-line{width:14px;height:2px;border-radius:1px}
.legend-dash{width:14px;border-top:2px dashed #CCC}

/* 도넛 */
.donut-wrap{text-align:center;margin-bottom:10px}
.donut-info{border-top:0.5px solid #EEEBE4;padding-top:10px}
.donut-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.donut-row span:first-child{color:#888}
.donut-row span:last-child{font-weight:700}

/* 바 차트 (카테고리) */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:#888;width:80px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:#E8E4DC;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:#1A1A1A;border-radius:3px;transition:width .4s}
.bar-val{font-size:11px;font-weight:700;color:#1A1A1A;width:28px;text-align:right}

/* 드롭다운 */
.dropdown-wrap{position:relative;margin-bottom:10px}
.dropdown-btn{width:100%;padding:7px 12px;border-radius:8px;border:0.5px solid #EEEBE4;background:#FAF8F3;font-size:11px;color:#1A1A1A;text-align:left;display:flex;justify-content:space-between}
.dropdown-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid #EEEBE4;border-radius:8px;max-height:180px;overflow-y:auto;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.08);display:none}
.dropdown-list.open{display:block}
.dropdown-item{padding:5px 12px;font-size:11px;display:flex;align-items:center;gap:6px;cursor:pointer}
.dropdown-item:hover{background:#FAF8F3}

/* 리뷰 탭 */
.review-tabs{display:flex;border-bottom:0.5px solid #EEEBE4;margin-bottom:14px}
.rtab{padding:6px 14px;font-size:12px;font-weight:400;border:none;background:none;color:#888;border-bottom:2px solid transparent}
.rtab.active{font-weight:700;color:#1A1A1A;border-bottom:2px solid #1A1A1A}
.review-list{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.review-item{padding:12px 14px;border-radius:10px;border:0.5px solid #EEEBE4}
.review-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.review-meta-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.review-rating{font-size:12px;font-weight:700}
.review-writer{font-size:11px;color:#888}
.review-date{font-size:11px;color:#888}
.review-help{font-size:11px;color:#888}
.score-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.review-content{font-size:12px;color:#1A1A1A;line-height:1.65;margin-bottom:4px}
.review-prod{font-size:10px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 탭 페이지 */
.page{display:none}
.page.active{display:block}

/* 로딩/에러 */
.loading{text-align:center;padding:100px;color:#888;font-size:14px}
.loading .icon{font-size:32px;margin-bottom:12px}
.error{text-align:center;padding:80px;color:#E53E3E;font-size:13px}
.retry-btn{margin-top:12px;padding:6px 16px;border-radius:8px;border:0.5px solid #EEEBE4;background:#fff;cursor:pointer;font-size:12px}

.green{color:#2F855A}.red{color:#E53E3E}.gold{color:#C9A84C}
</style>
</head>
<body>

<!-- 사이드바 -->
<div id="sidebar">
  <div class="logo">S</div>
  <button class="nav-btn active" onclick="switchTab(1)" id="nav1">
    <span class="icon">📊</span><span class="lbl">실적</span>
  </button>
  <button class="nav-btn" onclick="switchTab(2)" id="nav2">
    <span class="icon">💬</span><span class="lbl">부정후기</span>
  </button>
</div>

<!-- 메인 -->
<div id="main">
  <!-- 헤더 -->
  <div class="header">
    <div>
      <div class="header-title" id="page-title">SIDIZ 네이버 실적 대시보드</div>
      <div class="header-sub" id="last-updated">Last updated: -</div>
    </div>
    <div class="header-btns">
      <a class="hbtn" href="https://docs.google.com/spreadsheets/d/1UyoOkvJMY8kTLAZzjw6PoYw6J_YWrfakcP9iEvCUrQs" target="_blank">📋 원본 시트</a>
      <button class="hbtn" onclick="fetchAll()">🔄 새로고침</button>
    </div>
  </div>

  <!-- 필터바 -->
  <div class="filter-bar" id="filter-bar"></div>

  <!-- 탭1 -->
  <div class="page active" id="tab1-page">
    <div id="tab1-content"></div>
  </div>

  <!-- 탭2 -->
  <div class="page" id="tab2-page">
    <div id="tab2-content"></div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw48_cTrcAG14Y-reW6anXa4RZafUGUdunvdkyH1J4dVyaIaOK8kJI0U4odKXz8Pypseg/exec";
const GID1 = "543240057", GID2 = "1006983265";

let tab1Raw=[], tab2Raw=[], selYear=2026, selMonth=null, currentTab=1;
let charts={};

// ── 유틸 ──────────────────────────────────────────────────────
const fmt억=v=>{const n=Number(v);return isNaN(n)||!v?"-":(n/1e8).toFixed(1)+"억";};
const fmtPct=v=>{const n=parseFloat(v);return isNaN(n)?"-":n.toFixed(1)+"%";};
const fmtWon=v=>{const n=Number(v);return isNaN(n)||!v?"-":n.toLocaleString("ko-KR")+"원";};
const fmtNum=v=>(!v&&v!==0)?"-":Number(v).toLocaleString("ko-KR");
const toN=x=>parseFloat(String(x).replace(/[,\s%]/g,""))||0;

function calcScore(rating,help,hasRel,len){
  return ({1:3,2:2,3:1}[rating]||0)*2 + (help>=5?3:help>=1?2:0)*2 + (hasRel?5:0) + (len>=50?5:len>=30?3:1);
}
function scoreLevel(s){return s<=5?"낮음":s<=10?"보통":s<=15?"높음":"심각";}
const levelColor={"낮음":"#888","보통":"#C9A84C","높음":"#E88C00","심각":"#E53E3E"};
const levelBg={"낮음":"#F5F5F5","보통":"#FFF8E8","높음":"#FFF0D0","심각":"#FFF0F0"};

// ── 데이터 fetch ────────────────────────────────────────────────
async function fetchAll(){
  showLoading();
  try{
    const [r1,r2]=await Promise.all([fetch(`${API}?gid=${GID1}`),fetch(`${API}?gid=${GID2}`)]);
    const [j1,j2]=await Promise.all([r1.json(),r2.json()]);
    tab1Raw=j1.data||[]; tab2Raw=j2.data||[];
    document.getElementById("last-updated").textContent="Last updated: "+new Date().toLocaleDateString("ko-KR");
    const yrs=[...new Set(tab1Raw.map(r=>{const d=Object.values(r)[0]||"";return parseInt(String(d).split("/")[0]);}).filter(y=>!isNaN(y)))].sort();
    if(yrs.length)selYear=Math.max(...yrs);
    render();
  }catch(e){showError();}
}

function showLoading(){
  document.getElementById("tab1-content").innerHTML='<div class="loading"><div class="icon">⏳</div>데이터 불러오는 중...</div>';
  document.getElementById("tab2-content").innerHTML='<div class="loading"><div class="icon">⏳</div>데이터 불러오는 중...</div>';
}
function showError(){
  document.getElementById("tab1-content").innerHTML='<div class="error">⚠️ 데이터를 불러오지 못했어요.<br><button class="retry-btn" onclick="fetchAll()">다시 시도</button></div>';
}

// ── 탭 전환 ─────────────────────────────────────────────────────
function switchTab(t){
  currentTab=t;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(`tab${t}-page`).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(`nav${t}`).classList.add("active");
  document.getElementById("page-title").textContent=t===1?"SIDIZ 네이버 실적 대시보드":"네이버 부정후기 추이";
  buildFilterBar();
}

// ── 파싱 ────────────────────────────────────────────────────────
function parseTab1(){
  return tab1Raw.map(row=>{
    const v=Object.values(row);
    const parts=String(v[0]||"").split("/");
    return{year:parseInt(parts[0]),month:parseInt(parts[1]),
      ERP:toN(v[10]),target:toN(v[8]),achieve:toN(v[11]),
      buyers:toN(v[4]),refundAmt:toN(v[7]),payment:toN(v[6]),
      refundCnt:toN(v[5]),reviews:toN(v[3]),aov:toN(v[12]),
      refundRate:toN(v[13]),reviewYoy:toN(v[14])};
  }).filter(r=>!isNaN(r.year)&&r.year>2000);
}

function parseTab2(){
  return tab2Raw.map(row=>{
    const v=Object.values(row);
    const parts=String(v[0]||"").split("-");
    const rating=parseInt(v[7])||0;
    const content=String(v[8]||"");
    const help=parseInt(v[9])||0;
    const related=String(v[10]||"").trim();
    const score=calcScore(rating,help,!!related,content.length);
    return{year:parseInt(parts[0]),month:parseInt(parts[1]),
      date:String(v[0]||""),prodName:String(v[5]||""),writer:String(v[6]||""),
      rating,content,help,related,score,level:scoreLevel(score)};
  }).filter(r=>!isNaN(r.year)&&r.year>2000&&r.rating>0&&r.rating<=3);
}

// ── 필터바 ───────────────────────────────────────────────────────
function buildFilterBar(){
  const p1=parseTab1(); const p2=parseTab2();
  const years=[...new Set([...p1.map(r=>r.year),...p2.map(r=>r.year)])].sort();
  const cur=currentTab===1?p1.filter(r=>r.year===selYear):p2.filter(r=>r.year===selYear);
  const activeM=selMonth||getLatestMonth(p1);

  let html='';
  years.forEach(y=>{
    html+=`<button class="fbtn${selYear===y?' active':''}" onclick="setYear(${y})">${y}년</button>`;
  });
  html+='<div class="divider"></div>';
  for(let m=1;m<=12;m++){
    const has=cur.some(r=>r.month===m);
    const active=activeM===m;
    html+=`<button class="fbtn${active?' active':''}" ${has?'':'disabled'} onclick="setMonth(${m})">${m}월</button>`;
  }
  document.getElementById("filter-bar").innerHTML=html;
}

function getLatestMonth(data){
  const cur=data.filter(r=>r.year===selYear);
  const months=cur.map(r=>r.month).filter(m=>!isNaN(m));
  return months.length?Math.max(...months):null;
}

function setYear(y){selYear=y;selMonth=null;render();}
function setMonth(m){selMonth=selMonth===m?null:m;render();}

// ── 차트 파괴 ───────────────────────────────────────────────────
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

// ── 렌더 ────────────────────────────────────────────────────────
function render(){
  buildFilterBar();
  if(currentTab===1)renderTab1();
  else renderTab2();
}

// ════════════════ TAB1 렌더 ════════════════
function renderTab1(){
  const p1=parseTab1();
  const cur=p1.filter(r=>r.year===selYear);
  const prev=p1.filter(r=>r.year===selYear-1);
  const activeM=selMonth||getLatestMonth(p1);
  const curMD=cur.find(r=>r.month===activeM);
  const prevMD=cur.find(r=>r.month===(activeM||1)-1);

  const ytdERP=cur.reduce((s,r)=>s+r.ERP,0);
  const ytdTarget=cur.reduce((s,r)=>s+r.target,0);
  const ytdAch=ytdTarget>0?(ytdERP/ytdTarget)*100:0;
  const prevYtd=prev.filter(r=>r.month<=(activeM||12)).reduce((s,r)=>s+r.ERP,0);
  const ytdYoY=prevYtd>0?((ytdERP-prevYtd)/prevYtd)*100:0;
  const ytdBuyers=cur.reduce((s,r)=>s+r.buyers,0);
  const avgAOV=ytdBuyers>0?ytdERP/ytdBuyers:0;
  const prevAOV=prev.length?prev.reduce((s,r)=>s+r.aov,0)/prev.length:0;
  const aovYoY=prevAOV>0?((avgAOV-prevAOV)/prevAOV)*100:0;
  const ytdRefund=cur.reduce((s,r)=>s+r.refundAmt,0);
  const ytdPay=cur.reduce((s,r)=>s+r.payment,0);
  const avgRefRate=ytdPay>0?(ytdRefund/ytdPay)*100:0;
  const prevRefRate=prev.length?prev.reduce((s,r)=>s+r.refundRate,0)/prev.length:0;
  const refYoY=avgRefRate-prevRefRate;

  const donutPct=Math.min(ytdAch,100);
  const r=60,stroke=14,circ=2*Math.PI*r;
  const dash=circ*(1-donutPct/100);

  const kpi1=[
    {label:"YTD 누적 ERP 매출",val:fmt억(ytdERP),icon:"🎯",
     sub:`${ytdYoY>=0?"▲":"▼"} ${Math.abs(ytdYoY).toFixed(1)}% YoY (${selYear} vs ${selYear-1})`,sc:ytdYoY>=0?"green":"red"},
    {label:"YTD 누적 목표 달성율",val:fmtPct(ytdAch),icon:"✓",
     sub:`Target: ${fmt억(ytdTarget)}`,sc:"gold"},
    {label:"올해 평균 객단가",val:fmtWon(Math.round(avgAOV)),icon:"👤",
     sub:`${aovYoY>=0?"▲":"▼"} ${Math.abs(aovYoY).toFixed(1)}% 증감 (YoY)`,sc:aovYoY>=0?"green":"red"},
    {label:"올해 평균 환불율",val:fmtPct(avgRefRate),icon:"↩",
     sub:`${refYoY>=0?"▲":"▼"} ${Math.abs(refYoY).toFixed(1)}%p 증감 (YoY)`,sc:refYoY<=0?"green":"red"},
  ];

  const calcSub=(c,p,type)=>{
    if(!c||!p)return"";
    if(type==="pct"){const d=(c-p).toFixed(1);return`${d>=0?"+":""}${d}%p 전월 대비`;}
    if(p===0)return"";
    const d=((c-p)/p*100).toFixed(1);return`${d>=0?"+":""}${d}% 전월 대비`;
  };

  const kpi2=[
    {label:`${activeM}월 매출`,val:fmt억(curMD?.ERP),icon:"📈",
     sub:calcSub(curMD?.ERP,prevMD?.ERP,"val"),sc:curMD&&prevMD?(curMD.ERP>=prevMD.ERP?"green":"red"):""},
    {label:`${activeM}월 목표 달성율`,val:fmtPct(curMD?.achieve),icon:"🏆",
     sub:calcSub(curMD?.achieve,prevMD?.achieve,"pct"),sc:curMD&&prevMD?(curMD.achieve>=prevMD.achieve?"green":"red"):""},
    {label:`${activeM}월 객단가`,val:fmtWon(curMD?.aov),icon:"💰",
     sub:calcSub(curMD?.aov,prevMD?.aov,"val"),sc:curMD&&prevMD?(curMD.aov>=prevMD.aov?"green":"red"):""},
    {label:`${activeM}월 환불율`,val:fmtPct(curMD?.refundRate),icon:"↩",
     sub:calcSub(curMD?.refundRate,prevMD?.refundRate,"pct"),sc:curMD&&prevMD?(curMD.refundRate<=prevMD.refundRate?"green":"red"):""},
  ];

  const kpiHtml=arr=>arr.map(k=>`
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-label">${k.label}</span><span class="kpi-icon">${k.icon}</span></div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-sub ${k.sc||''}">${k.sub||""}</div>
    </div>`).join("");

  // 월별 데이터
  const months=Array.from({length:12},(_,i)=>i+1);
  const mLabels=months.map(m=>`${m}`);
  const erp=months.map(m=>cur.find(r=>r.month===m)?.ERP||null);
  const tgt=months.map(m=>cur.find(r=>r.month===m)?.target||null);
  const prevErp=months.map(m=>prev.find(r=>r.month===m)?.ERP||null);
  const ach=months.map(m=>cur.find(r=>r.month===m)?.achieve||null);
  const buyers=months.map(m=>cur.find(r=>r.month===m)?.buyers||null);
  const prevBuyers=months.map(m=>prev.find(r=>r.month===m)?.buyers||null);
  const reviews=months.map(m=>cur.find(r=>r.month===m)?.reviews||null);
  const prevReviews=months.map(m=>prev.find(r=>r.month===m)?.reviews||null);
  const reviewYoy=months.map(m=>cur.find(r=>r.month===m)?.reviewYoy||null);
  const refundAmt=cur.map(r=>r.refundAmt);
  const refundCnt=cur.map(r=>r.refundCnt);
  const refundMonths=cur.map(r=>`${r.month}`);

  ['chart-monthly','chart-buyers','chart-refund','chart-review'].forEach(destroyChart);

  document.getElementById("tab1-content").innerHTML=`
    <div class="kpi-grid">${kpiHtml(kpi1)}</div>
    <div class="kpi-grid">${kpiHtml(kpi2)}</div>

    <div class="chart-grid-donut">
      <div class="chart-card">
        <div class="chart-title">연 목표 달성율</div>
        <div class="chart-sub">${selYear}년</div>
        <div class="donut-wrap">
          <svg width="160" height="160" viewBox="0 0 160 160" style="display:block;margin:0 auto">
            <circle cx="80" cy="80" r="${r}" fill="none" stroke="#E8E4DC" stroke-width="${stroke}"/>
            <circle cx="80" cy="80" r="${r}" fill="none" stroke="#C9A84C"
              stroke-width="${stroke}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${dash.toFixed(2)}"
              stroke-linecap="round" transform="rotate(-90 80 80)"/>
            <text x="80" y="74" text-anchor="middle" font-size="20" font-weight="800" fill="#C9A84C">${donutPct.toFixed(1)}%</text>
            <text x="80" y="94" text-anchor="middle" font-size="10" fill="#888">Achieved</text>
          </svg>
        </div>
        <div class="donut-info">
          <div class="donut-row"><span>YTD 실적</span><span>${fmt억(ytdERP)}</span></div>
          <div class="donut-row"><span>연간 총 목표</span><span>${fmt억(ytdTarget)}</span></div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">월별 실적 vs 목표 달성</div>
        <div class="chart-sub">${selYear}년 ERP 매출 및 달성율</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-rect" style="background:#1A1A1A"></div>실적</div>
          <div class="legend-item"><div class="legend-rect" style="background:#E8E4DC"></div>목표</div>
          <div class="legend-item"><div class="legend-dash"></div>전년실적</div>
          <div class="legend-item"><div class="legend-line" style="background:#C9A84C"></div>달성율</div>
        </div>
        <canvas id="chart-monthly" height="220"></canvas>
      </div>
    </div>

    <div class="chart-grid-2">
      <div class="chart-card">
        <div class="chart-title">구매자수 추이</div>
        <div class="chart-sub">${selYear}년 vs ${selYear-1}년</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-rect" style="background:#1A1A1A"></div>${selYear}년</div>
          <div class="legend-item"><div class="legend-rect" style="background:#E8E4DC"></div>${selYear-1}년</div>
        </div>
        <canvas id="chart-buyers" height="190"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">환불 추이</div>
        <div class="chart-sub">금액(막대) 및 건수(선)</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-rect" style="background:#F9BFBF"></div>금액</div>
          <div class="legend-item"><div class="legend-line" style="background:#E53E3E"></div>건수</div>
        </div>
        <canvas id="chart-refund" height="190"></canvas>
      </div>
    </div>

    <div class="chart-card full">
      <div class="chart-title">리뷰수 추이 및 전년비</div>
      <div class="chart-sub">${selYear}년 vs ${selYear-1}년 (YoY)</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-rect" style="background:#1A1A1A"></div>${selYear}년</div>
        <div class="legend-item"><div class="legend-rect" style="background:#E8E4DC"></div>${selYear-1}년</div>
        <div class="legend-item"><div class="legend-line" style="background:#C9A84C"></div>YoY %</div>
      </div>
      <canvas id="chart-review" height="180"></canvas>
    </div>
  `;

  // 차트 생성
  requestAnimationFrame(()=>{
    const co={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{
      if(ctx.dataset.label==="달성율")return` ${ctx.raw?.toFixed(1)||0}%`;
      if(ctx.dataset.label==="건수")return` ${fmtNum(ctx.raw)}건`;
      return` ${fmt억(ctx.raw)}`;
    }}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:"#888"}},y:{grid:{color:"#F0EDE7"},ticks:{font:{size:10},color:"#888"}}}};

    // 월별 복합
    charts["chart-monthly"]=new Chart(document.getElementById("chart-monthly"),{
      type:"bar",
      data:{labels:mLabels,datasets:[
        {label:"실적",data:erp,backgroundColor:"#1A1A1A",borderRadius:3,order:2,yAxisID:"y"},
        {label:"목표",data:tgt,type:"line",borderColor:"#E8E4DC",borderWidth:2,pointBackgroundColor:"#E8E4DC",pointRadius:3,fill:false,order:1,yAxisID:"y"},
        {label:"전년실적",data:prevErp,type:"line",borderColor:"#CCC",borderWidth:1.5,borderDash:[5,3],pointBackgroundColor:"#CCC",pointRadius:2,fill:false,order:1,yAxisID:"y"},
        {label:"달성율",data:ach,type:"line",borderColor:"#C9A84C",borderWidth:2,pointBackgroundColor:"#C9A84C",pointRadius:3,fill:false,order:0,yAxisID:"y2"},
      ]},
      options:{...co,scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:"#888"}},
        y:{grid:{color:"#F0EDE7"},ticks:{font:{size:10},color:"#888",callback:v=>v?(v/1e8).toFixed(0)+"억":""}},
        y2:{position:"right",grid:{display:false},ticks:{font:{size:10},color:"#C9A84C",callback:v=>v+"%"}},
      }}
    });

    // 구매자
    charts["chart-buyers"]=new Chart(document.getElementById("chart-buyers"),{
      type:"line",
      data:{labels:mLabels,datasets:[
        {label:`${selYear-1}년`,data:prevBuyers,borderColor:"#E8E4DC",backgroundColor:"rgba(232,228,220,0.3)",borderWidth:1.5,fill:true,pointRadius:0,tension:0.4},
        {label:`${selYear}년`,data:buyers,borderColor:"#1A1A1A",backgroundColor:"rgba(26,26,26,0.08)",borderWidth:2,fill:true,pointBackgroundColor:"#1A1A1A",pointRadius:3,tension:0.4},
      ]},
      options:{...co,scales:{x:{grid:{display:false},ticks:{font:{size:11},color:"#888"}},y:{grid:{color:"#F0EDE7"},ticks:{font:{size:10},color:"#888",callback:v=>v?(v/1000).toFixed(0)+"k":""}}}},
    });

    // 환불
    charts["chart-refund"]=new Chart(document.getElementById("chart-refund"),{
      type:"bar",
      data:{labels:refundMonths,datasets:[
        {label:"금액",data:refundAmt,backgroundColor:"#F9BFBF",borderRadius:3,order:2,yAxisID:"y"},
        {label:"건수",data:refundCnt,type:"line",borderColor:"#E53E3E",borderWidth:2,pointBackgroundColor:"#E53E3E",pointRadius:3,fill:false,order:1,yAxisID:"y2"},
      ]},
      options:{...co,scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:"#888"}},
        y:{grid:{color:"#F0EDE7"},ticks:{font:{size:10},color:"#888",callback:v=>v?(v/1e8).toFixed(1)+"억":""}},
        y2:{position:"right",grid:{display:false},ticks:{font:{size:10},color:"#E53E3E"}},
      }}
    });

    // 리뷰
    charts["chart-review"]=new Chart(document.getElementById("chart-review"),{
      type:"line",
      data:{labels:mLabels,datasets:[
        {label:`${selYear-1}년`,data:prevReviews,borderColor:"#E8E4DC",backgroundColor:"rgba(232,228,220,0.3)",borderWidth:1.5,fill:true,pointRadius:0,tension:0.4,yAxisID:"y"},
        {label:`${selYear}년`,data:reviews,borderColor:"#1A1A1A",backgroundColor:"rgba(26,26,26,0.08)",borderWidth:2,fill:true,pointBackgroundColor:"#1A1A1A",pointRadius:3,tension:0.4,yAxisID:"y"},
        {label:"YoY%",data:reviewYoy,borderColor:"#C9A84C",borderWidth:2,pointBackgroundColor:reviewYoy.map(v=>v>=0?"#2F855A":"#E53E3E"),pointRadius:4,fill:false,tension:0.4,yAxisID:"y2"},
      ]},
      options:{...co,scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:"#888"}},
        y:{grid:{color:"#F0EDE7"},ticks:{font:{size:10},color:"#888"}},
        y2:{position:"right",grid:{display:false},ticks:{font:{size:10},color:"#C9A84C",callback:v=>v+"%"}},
      }}
    });
  });
}

// ════════════════ TAB2 렌더 ════════════════
let activeRTab=1, prodFilter=[];

function renderTab2(){
  const p2=parseTab2();
  const cur=p2.filter(r=>r.year===selYear);
  const prev=p2.filter(r=>r.year===selYear-1);
  const p1=parseTab1();
  const activeM=selMonth||getLatestMonth(p1);
  const cur2M=cur.filter(r=>r.month===activeM);
  const prevM=cur.filter(r=>r.month===(activeM||1)-1);

  const ytdNeg=cur.length, ytd1=cur.filter(r=>r.rating===1).length, ytd2=cur.filter(r=>r.rating===2).length;
  const prevNeg=prev.length, yoyNeg=prevNeg>0?((ytdNeg-prevNeg)/prevNeg)*100:0;
  const mnNeg=cur2M.length, mn1=cur2M.filter(r=>r.rating===1).length, mn2=cur2M.filter(r=>r.rating===2).length;
  const prevMnNeg=prevM.length, momNeg=prevMnNeg>0?((mnNeg-prevMnNeg)/prevMnNeg)*100:0;

  const kpi1=[
    {label:`${selYear}년 총 부정후기`,val:fmtNum(ytdNeg)+"건",icon:"💬",
     sub:`${yoyNeg>=0?"▲":"▼"} ${Math.abs(yoyNeg).toFixed(1)}% YoY`,sc:yoyNeg<=0?"green":"red"},
    {label:`${selYear}년 1점 누적`,val:fmtNum(ytd1)+"건",icon:"⭐",
     sub:`전체의 ${ytdNeg?(ytd1/ytdNeg*100).toFixed(1):0}%`,sc:"red"},
    {label:`${selYear}년 2점 누적`,val:fmtNum(ytd2)+"건",icon:"⭐",
     sub:`전체의 ${ytdNeg?(ytd2/ytdNeg*100).toFixed(1):0}%`,sc:"gold"},
    {label:"전년비 증감",val:`${yoyNeg>=0?"+":""}${yoyNeg.toFixed(1)}%`,icon:"📉",
     sub:`${selYear-1}년 ${fmtNum(prevNeg)}건 → ${selYear}년 ${fmtNum(ytdNeg)}건`,sc:yoyNeg<=0?"green":"red"},
  ];
  const kpi2=[
    {label:`${activeM}월 총 부정후기`,val:fmtNum(mnNeg)+"건",icon:"📋",
     sub:`${momNeg>=0?"▲":"▼"} ${Math.abs(momNeg).toFixed(1)}% 전월 대비`,sc:momNeg<=0?"green":"red"},
    {label:`${activeM}월 1점`,val:fmtNum(mn1)+"건",icon:"🔴",
     sub:`월내 ${mnNeg?(mn1/mnNeg*100).toFixed(1):0}%`,sc:"red"},
    {label:`${activeM}월 2점`,val:fmtNum(mn2)+"건",icon:"🟡",
     sub:`월내 ${mnNeg?(mn2/mnNeg*100).toFixed(1):0}%`,sc:"gold"},
    {label:"전월비 증감",val:`${momNeg>=0?"+":""}${momNeg.toFixed(1)}%`,icon:"📊",
     sub:`전월 ${fmtNum(prevMnNeg)}건 → 이번달 ${fmtNum(mnNeg)}건`,sc:momNeg<=0?"green":"red"},
  ];
  const kpiHtml=arr=>arr.map(k=>`
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-label">${k.label}</span><span class="kpi-icon">${k.icon}</span></div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-sub ${k.sc||''}">${k.sub||""}</div>
    </div>`).join("");

  const months=Array.from({length:12},(_,i)=>i+1);
  const negCur=months.map(m=>cur.filter(r=>r.month===m).length||null);
  const negPrev=months.map(m=>prev.filter(r=>r.month===m).length||null);
  const r1=months.map(m=>cur.filter(r=>r.month===m&&r.rating===1).length||null);
  const r2=months.map(m=>cur.filter(r=>r.month===m&&r.rating===2).length||null);
  const r3=months.map(m=>cur.filter(r=>r.month===m&&r.rating===3).length||null);

  // 카테고리
  const getCategory=name=>{
    if(!name)return"기타";
    const m=name.match(/T\d+/);if(m)return m[0]+" 시리즈";
    if(name.includes("링고"))return"링고";if(name.includes("아이블"))return"아이블";
    if(name.includes("GX")||name.includes("게이밍"))return"게이밍";
    if(name.includes("스툴")||name.includes("펑거스"))return"스툴";
    if(name.includes("발받침")||name.includes("옷걸이")||name.includes("커버"))return"액세서리";
    if(name.includes("좌식"))return"좌식";
    if(name.includes("에가")||name.includes("뮤브")||name.includes("탭스퀘어")||name.includes("아띠"))return"회의/유아";
    return"기타";
  };
  const catMap={};cur.forEach(r=>{const c=getCategory(r.prodName);catMap[c]=(catMap[c]||0)+1;});
  const catData=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const catMax=catData[0]?.[1]||1;
  const catBars=catData.map(([cat,cnt])=>`
    <div class="bar-row">
      <div class="bar-label">${cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(cnt/catMax*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>`).join("");

  const allProds=[...new Set(cur.map(r=>r.prodName).filter(Boolean))].sort();
  const filtered=prodFilter.length>0?cur.filter(r=>prodFilter.includes(r.prodName)):cur;
  const prodMap={};filtered.forEach(r=>{const k=r.prodName||"미상";prodMap[k]=(prodMap[k]||0)+1;});
  const prodData=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const prodMax=prodData[0]?.[1]||1;
  const prodBars=prodData.map(([prod,cnt])=>`
    <div class="bar-row">
      <div class="bar-label" style="width:110px;font-size:10px">${prod.replace(/\[.*?\]/g,"").trim().slice(0,20)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(cnt/prodMax*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${cnt}</div>
    </div>`).join("");

  const dropItems=['<div class="dropdown-item"><label><input type="checkbox" '+(prodFilter.length===0?"checked":"")+'  onchange="setProdFilter([])"> 전체</label></div>',
    ...allProds.map(p=>`<div class="dropdown-item"><label><input type="checkbox" ${prodFilter.includes(p)?"checked":""} onchange="toggleProd('${p.replace(/'/g,"\\'")}')"> ${p.replace(/\[.*?\]/g,"").trim().slice(0,30)}</label></div>`)
  ].join("");

  ['chart-neg-trend','chart-neg-rating'].forEach(destroyChart);

  document.getElementById("tab2-content").innerHTML=`
    <div class="kpi-grid">${kpiHtml(kpi1)}</div>
    <div class="kpi-grid">${kpiHtml(kpi2)}</div>

    <div class="chart-grid-2">
      <div class="chart-card">
        <div class="chart-title">총 부정후기 추이</div>
        <div class="chart-sub">3점 이하 — ${selYear}년 vs ${selYear-1}년</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-rect" style="background:#1A1A1A"></div>${selYear}년</div>
          <div class="legend-item"><div class="legend-rect" style="background:#E8E4DC"></div>${selYear-1}년</div>
        </div>
        <canvas id="chart-neg-trend" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">월별 평점별 부정후기</div>
        <div class="chart-sub">${selYear}년 1·2·3점</div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:#E53E3E"></div>1점</div>
          <div class="legend-item"><div class="legend-dot" style="background:#4A90D9"></div>2점</div>
          <div class="legend-item"><div class="legend-dot" style="background:#C9A84C"></div>3점</div>
        </div>
        <canvas id="chart-neg-rating" height="200"></canvas>
      </div>
    </div>

    <div class="chart-grid-2">
      <div class="chart-card">
        <div class="chart-title">카테고리별 부정후기</div>
        <div class="chart-sub">${selYear}년 누적</div>
        ${catBars||'<div style="color:#888;font-size:12px;padding:20px 0;text-align:center">데이터 없음</div>'}
      </div>
      <div class="chart-card">
        <div class="chart-title">상품별 부정후기</div>
        <div class="chart-sub">${selYear}년 — 드롭다운 필터</div>
        <div class="dropdown-wrap">
          <button class="dropdown-btn" onclick="toggleDrop()">
            <span>${prodFilter.length?prodFilter.length+"개 선택됨":"전체 상품"}</span><span id="drop-arrow">▼</span>
          </button>
          <div class="dropdown-list" id="drop-list">${dropItems}</div>
        </div>
        ${prodBars||'<div style="color:#888;font-size:12px;padding:20px 0;text-align:center">데이터 없음</div>'}
      </div>
    </div>

    <div class="chart-card full">
      <div class="chart-title">부정후기 원본 목록</div>
      <div class="chart-sub">${activeM}월 — 평점별 탭 / 영향력 점수 순</div>
      <div class="review-tabs">
        <button class="rtab${activeRTab===1?" active":""}" onclick="setRTab(1)">1점 (${cur2M.filter(r=>r.rating===1).length}건)</button>
        <button class="rtab${activeRTab===2?" active":""}" onclick="setRTab(2)">2점 (${cur2M.filter(r=>r.rating===2).length}건)</button>
        <button class="rtab${activeRTab===3?" active":""}" onclick="setRTab(3)">3점 (${cur2M.filter(r=>r.rating===3).length}건)</button>
        <button class="rtab${activeRTab===99?" active":""}" onclick="setRTab(99)">영향력 높은 순</button>
      </div>
      <div class="review-list" id="review-list"></div>
    </div>
  `;

  requestAnimationFrame(()=>{
    const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11},color:"#888"}},y:{grid:{color:"#F0EDE7"},ticks:{font:{size:10},color:"#888"}}}};

    charts["chart-neg-trend"]=new Chart(document.getElementById("chart-neg-trend"),{
      type:"line",
      data:{labels:months.map(m=>`${m}`),datasets:[
        {label:`${selYear-1}년`,data:negPrev,borderColor:"#E8E4DC",backgroundColor:"rgba(232,228,220,0.3)",fill:true,borderWidth:1.5,pointRadius:0,tension:0.4},
        {label:`${selYear}년`,data:negCur,borderColor:"#1A1A1A",backgroundColor:"rgba(26,26,26,0.08)",fill:true,borderWidth:2,pointBackgroundColor:"#1A1A1A",pointRadius:3,tension:0.4},
      ]},options:opts
    });

    charts["chart-neg-rating"]=new Chart(document.getElementById("chart-neg-rating"),{
      type:"line",
      data:{labels:months.map(m=>`${m}`),datasets:[
        {label:"1점",data:r1,borderColor:"#E53E3E",borderWidth:2,pointBackgroundColor:"#E53E3E",pointRadius:3,fill:false,tension:0.4},
        {label:"2점",data:r2,borderColor:"#4A90D9",borderWidth:2,pointBackgroundColor:"#4A90D9",pointRadius:3,fill:false,tension:0.4},
        {label:"3점",data:r3,borderColor:"#C9A84C",borderWidth:2,pointBackgroundColor:"#C9A84C",pointRadius:3,fill:false,tension:0.4},
      ]},options:opts
    });

    renderReviews(cur2M);
  });
}

function renderReviews(cur2M){
  const sorted=activeRTab===99?[...cur2M].sort((a,b)=>b.score-a.score):
    cur2M.filter(r=>r.rating===activeRTab).sort((a,b)=>b.score-a.score);
  const stars=n=>"★".repeat(n)+"☆".repeat(3-n);
  const rColor={1:"#E53E3E",2:"#C9A84C",3:"#888"};
  const html=sorted.length?sorted.map(rv=>`
    <div class="review-item" style="background:${levelBg[rv.level]}">
      <div class="review-meta">
        <div class="review-meta-left">
          <span class="review-rating" style="color:${rColor[rv.rating]}">${stars(rv.rating)} ${rv.rating}점</span>
          <span class="review-writer">${rv.writer}</span>
          <span class="review-date">${rv.date}</span>
          ${rv.help>0?`<span class="review-help">도움 ${rv.help}</span>`:""}
        </div>
        <span class="score-badge" style="background:${levelBg[rv.level]};color:${levelColor[rv.level]};border:0.5px solid ${levelColor[rv.level]}50">
          ${rv.level} ${rv.score}점
        </span>
      </div>
      <div class="review-content">${rv.content}</div>
      <div class="review-prod">${rv.prodName}</div>
    </div>`).join("")
    :'<div style="text-align:center;padding:40px;color:#888;font-size:13px">해당 월 데이터가 없습니다</div>';
  document.getElementById("review-list").innerHTML=html;
}

function setRTab(t){
  activeRTab=t;
  document.querySelectorAll(".rtab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".rtab")[t===99?3:t-1]?.classList.add("active");
  const p2=parseTab2();
  const p1=parseTab1();
  const activeM=selMonth||getLatestMonth(p1);
  const cur2M=p2.filter(r=>r.year===selYear&&r.month===activeM);
  renderReviews(cur2M);
}

let dropOpen=false;
function toggleDrop(){
  dropOpen=!dropOpen;
  document.getElementById("drop-list").classList.toggle("open",dropOpen);
  document.getElementById("drop-arrow").textContent=dropOpen?"▲":"▼";
}
function setProdFilter(arr){prodFilter=arr;renderTab2();}
function toggleProd(p){
  prodFilter=prodFilter.includes(p)?prodFilter.filter(x=>x!==p):[...prodFilter,p];
  renderTab2();
}

// 시작
fetchAll();
</script>
